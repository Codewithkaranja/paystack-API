<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout</title>

<style>

*{
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:#111;
}

.wrapper{
width:800px;
max-width:95%;
background:white;
border-radius:18px;
padding:40px;
box-shadow:0 30px 70px rgba(0,0,0,0.35);
}

h1{
text-align:center;
margin-bottom:30px;
color:#0f172a;
}

.plans{
display:flex;
gap:20px;
margin-bottom:30px;
}

.plan{
flex:1;
border:1px solid #e2e8f0;
border-radius:12px;
padding:20px;
text-align:center;
cursor:pointer;
transition:all .2s;
}

.plan:hover{
border-color:#3b82f6;
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.08);
}

.plan.active{
border:2px solid #3b82f6;
background:#f8fafc;
}

.plan h3{
margin:0;
}

.price{
font-size:28px;
margin:10px 0;
font-weight:600;
}

.form{
margin-top:20px;
}

label{
font-size:13px;
color:#475569;
display:block;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #e2e8f0;
font-size:14px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
background:#3b82f6;
border:none;
border-radius:10px;
color:white;
font-weight:600;
font-size:15px;
cursor:pointer;
transition:all .2s;
}

button:hover{
background:#2563eb;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
font-size:14px;
color:#475569;
}

.success{
display:none;
text-align:center;
padding:20px;
}

.success h2{
color:#16a34a;
}

.ref{
margin-top:10px;
font-size:14px;
color:#475569;
}

</style>

</head>

<body>

<div class="wrapper">

<h1>Select a Plan</h1>

<div class="plans">

<div class="plan" onclick="selectPlan(this,10)">
<h3>Starter</h3>
<div class="price">$10</div>
<p>Basic service package</p>
</div>

<div class="plan" onclick="selectPlan(this,25)">
<h3>Professional</h3>
<div class="price">$25</div>
<p>Advanced service package</p>
</div>

<div class="plan" onclick="selectPlan(this,50)">
<h3>Enterprise</h3>
<div class="price">$50</div>
<p>Full premium service</p>
</div>

</div>

<div class="form">

<label>Email</label>
<input id="email" placeholder="client@email.com">

<label>Amount (USD)</label>
<input id="amount" placeholder="Select a plan above">

<button onclick="payWithPaystack()">Pay Securely</button>

<div class="loading" id="loading">Processing payment...</div>

</div>

<div class="success" id="success">

<h2>Payment Successful</h2>

<p>Your transaction was completed.</p>

<div class="ref" id="reference"></div>

</div>

</div>



<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

function getParam(name){
const params = new URLSearchParams(window.location.search)
return params.get(name)
}

const urlEmail = getParam("email")
const urlAmount = getParam("amount")
const callback = getParam("callback")

if(urlEmail){
document.getElementById("email").value = urlEmail
}

if(urlAmount){
document.getElementById("amount").value = urlAmount
}

function selectPlan(element,price){

document.querySelectorAll(".plan").forEach(p=>p.classList.remove("active"))

element.classList.add("active")

document.getElementById("amount").value = price

}

function payWithPaystack(){

let email = document.getElementById("email").value
let amount = document.getElementById("amount").value

if(!email || !amount){
alert("Please enter email and choose a plan")
return
}

document.getElementById("loading").style.display="block"

let handler = PaystackPop.setup({

key:'pk_live_c153cb0908e14cc552c2a6ac4723e8eac20d9f03',

email:email,

amount:amount * 100,

currency:"USD",

metadata:{
callback_url: callback
},

callback:function(response){

window.location = "/verify/" + response.reference

},

onClose:function(){

document.getElementById("loading").style.display="none"
alert("Payment window closed")

}

})

handler.openIframe()

}

</script>



</body>
</html>
