<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Processing Payment – FineEscorts</title>
  <style>
    body {
      font-family: 'Jost', sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      flex-direction: column;
    }
    .loader {
      border: 4px solid #333;
      border-top: 4px solid #c9a45c;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader"></div>
  <p>Initialising secure payment...</p>

  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script>
    // Get URL parameters
    const params = new URLSearchParams(window.location.search);
    const amount = params.get('amount');
    const email = params.get('email');
    const description = params.get('description') || 'Booking with FineEscorts';

    // Redirect back to the referring page if parameters are missing
    if (!amount || !email) {
      alert('Missing payment details. Please try again.');
      window.location.href = 'https://codewithkaranja.github.io/FineEscorts/';
    }

    // Trigger Paystack payment immediately
    const handler = PaystackPop.setup({
      key: 'pk_live_c153cb0908e14cc552c2a6ac4723e8eac20d9f03', // your live key
      email: email,
      amount: parseFloat(amount) * 100, // convert to kobo/cents
      currency: 'USD',
      metadata: {
        description: description
      },
      callback: function(response) {
        // Payment successful – redirect to thank-you page with reference
        const thankYouUrl = 'https://codewithkaranja.github.io/FineEscorts/thank-you.html?reference=' + response.reference;
        window.location.href = thankYouUrl;
      },
      onClose: function() {
        // User closed the payment window – go back to the profile or home
        if (document.referrer) {
          window.location.href = document.referrer;
        } else {
          window.location.href = 'https://codewithkaranja.github.io/FineEscorts/';
        }
      }
    });

    handler.openIframe();
  </script>
</body>
</html>
