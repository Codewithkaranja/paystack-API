<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#020617">
<title>Secure Checkout</title>
<style>
*{
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

/* ================= BASE (MOBILE FIRST) ================= */

body{
  margin:0;
  padding:16px;
  background:
    radial-gradient(circle at 10% 10%, rgba(99,102,241,0.15), transparent 40%),
    radial-gradient(circle at 90% 90%, rgba(59,130,246,0.15), transparent 40%),
    linear-gradient(135deg,#020617,#0f172a);
  min-height:100vh;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  color:#e2e8f0;
}

/* WRAPPER */
.wrapper{
  width:100%;
  max-width:100%;
  background:rgba(15,23,42,0.85);
  backdrop-filter:blur(20px);
  border-radius:18px;
  padding:24px 18px;
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
  position:relative;
}

/* TOP BAR */
.wrapper::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;
  border-radius:18px 18px 0 0;
  background:linear-gradient(90deg,#6366f1,#3b82f6,#22c55e);
}

/* HEADER */
.header{
  margin-bottom:18px;
}

.header h1{
  font-size:22px; /* BIG on mobile */
  margin:0;
}

.secure{
  font-size:13px;
  color:#22c55e;
  margin-top:4px;
}

/* CARD */
.card-preview{
  background:linear-gradient(135deg,#1e293b,#020617);
  border-radius:14px;
  padding:18px;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  position:relative;
}

.card-brand{
  position:absolute;
  top:12px;
  right:12px;
  font-size:13px;
  color:#94a3b8;
}

.card-number{
  letter-spacing:2px;
  font-size:18px; /* BIG */
  margin-top:18px;
}

.card-meta{
  display:flex;
  justify-content:space-between;
  margin-top:18px;
  font-size:13px;
  color:#94a3b8;
}

/* FORM */
label{
  font-size:12px;
  color:#94a3b8;
  margin-bottom:6px;
  display:block;
}

input{
  width:100%;
  padding:16px;
  font-size:16px; /* prevents zoom */
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.08);
  margin-bottom:16px;
  background:rgba(2,6,23,0.7);
  color:#e2e8f0;
  outline:none;
}

input:focus{
  border-color:#6366f1;
  box-shadow:0 0 0 3px rgba(99,102,241,0.25);
}

/* BUTTON */
button{
  width:100%;
  padding:16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:linear-gradient(135deg,#6366f1,#3b82f6);
  color:white;
  font-weight:600;
  cursor:pointer;
  box-shadow:0 12px 30px rgba(59,130,246,0.35);
}

/* TRUST */
.trust{
  text-align:center;
  font-size:12px;
  margin-top:18px;
  color:#94a3b8;
}

/* SUCCESS */
.success{
  display:none;
  text-align:center;
}

.success h2{
  color:#22c55e;
}

/* ================= TABLET ================= */

@media (min-width: 600px){

  .wrapper{
    max-width:480px;
    padding:28px 24px;
  }

  .header h1{
    font-size:20px;
  }

}

/* ================= DESKTOP ================= */

@media (min-width: 900px){

  body{
    align-items:center;
  }

  .wrapper{
    max-width:420px;
    padding:30px;
    border-radius:22px;
  }

  .header h1{
    font-size:18px;
  }

  .card-number{
    font-size:16px;
  }

}
</style>

</head>

<body>

<div class="wrapper">

<div class="header">
<h1>Confirm Payment</h1>

</div>

<!-- CARD PREVIEW 
<div class="card-preview">
<div class="card-brand" id="cardBrand">VISA</div>
<div class="card-number" id="cardNumber">•••• •••• •••• ••••</div>
<div class="card-meta">
<span id="cardName">YOUR NAME</span>
<span id="cardExpiry">MM/YY</span>
</div>
</div>-->

<div class="form">

<label>Email</label>
<input id="email" placeholder="client@email.com">

<label>Amount (USD)</label>
<input id="amount" placeholder="Enter amount">

<button onclick="payWithPaystack()">Pay Securely</button>

<div class="loading" id="loading">Processing payment...</div>

</div>
<br>
<div class="secure">🔒 Secure payments powered by encryption</div>

<div class="success" id="success">
<h2>Payment Successful</h2>
<p>Transaction completed</p>
<div id="reference"></div>
</div>

</div>

<script src="https://js.paystack.co/v1/inline.js"></script>

<script>

/* LIVE CARD UI */
document.getElementById("email").addEventListener("input", e=>{
document.getElementById("cardName").textContent = e.target.value || "YOUR NAME"
})

document.getElementById("amount").addEventListener("input", e=>{
document.getElementById("cardNumber").textContent = "$ " + e.target.value
})

/* PAYSTACK */
function payWithPaystack(){

let email = document.getElementById("email").value
let amount = document.getElementById("amount").value

if(!email || !amount){
alert("Fill all fields")
return
}

document.getElementById("loading").style.display="block"

let handler = PaystackPop.setup({

key:'pk_live_c153cb0908e14cc552c2a6ac4723e8eac20d9f03',

email:email,

amount:amount * 100,

currency:"USD",

callback:function(response){

document.getElementById("loading").style.display="none"
document.getElementById("success").style.display="block"
document.getElementById("reference").textContent = response.reference

},

onClose:function(){
document.getElementById("loading").style.display="none"
}

})

handler.openIframe()

}

</script>

</body>
</html>
